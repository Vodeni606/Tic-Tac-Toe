<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Tic Tac Toe</h1>
    </header>

    <div class="setup-container">
        <div class="setup-card">
            <input type="text" placeholder="Enter player 1 name">
            <input type="text" placeholder="Enter player 2 name">
            <button>START GAME</button>
        </div>
    </div>

    <div class="game-container">
        <div class="board">
            <div class="square" data-row="0" data-column="0">
            </div>
            <div class="square" data-row="0" data-column="1">
            </div>
            <div class="square" data-row="0" data-column="2">
            </div>
            <div class="square" data-row="1" data-column="0">
            </div>
            <div class="square" data-row="1" data-column="1">
            </div>
            <div class="square" data-row="1" data-column="2">
            </div>
            <div class="square" data-row="2" data-column="0">
            </div>
            <div class="square" data-row="2" data-column="1" >
            </div>
            <div class="square" data-row="2" data-column="2">
            </div>
        </div>

    <script src="script.js"></script>
</body>
</html>
